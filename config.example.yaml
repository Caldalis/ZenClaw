# MiniClaw 配置示例
# 复制为 config.yaml 并修改

# AI 提供商配置
providers:
  - type: openai
    api_key: ""           # 或设置环境变量 OPENAI_API_KEY
    model: gpt-4o-mini
    base_url: null        # 自定义端点
    max_tokens: 4096
    temperature: 0.7



# 记忆存储
memory:
  db_path: "data/miniclaw.db"
  enable_vector: false     # 启用向量搜索（需要 numpy + OpenAI Embeddings API）
  embedding_model: "text-embedding-3-small"
  embedding_dim: 1536


